services:
  - type: web
    name: opsflow
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: SUI_MODE
        value: mock
      - key: VETO_WINDOW_MS
        value: "20000"
      # Public object IDs from the real testnet deployment (move/deploy.ps1).
      # Safe to publish: no secrets. These let the hosted demo render the
      # org's real onchain object graph even while SUI_MODE=mock.
